kind = "web"
previewPath = "/"
title = "Digital Student Experience Survey"
version = "1.0.0"
id = "artifacts/survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18110

[services.development]
run = "pnpm --filter @workspace/survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/survey", "run", "build" ]
publicDir = "artifacts/survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18110"
BASE_PATH = "/"
